name: Build Docker Image

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          # 1. Aponta para a nova "receita" leve
          file: ./Dockerfile.slim 
          # 2. Foca apenas em ARM64 para ser 2x mais rápido e evitar erros
          platforms: linux/arm64 
          push: true
          # 3. Atualiza a 'latest' e a 'slim' com a versão magra
          tags: |
            lunarica/postgres-postgis-arm64:latest
            lunarica/postgres-postgis-arm64:slim
